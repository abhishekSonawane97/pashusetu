# PashuSetu CI — docs/13-deployment/README.md §3 (PS-002).
# Job names are the required status checks from doc 13 §2.1 step 2:
#   lint, typecheck, prisma-check, i18n-parity, unit, security-gates, integration, build
# All third-party actions pinned to commit SHAs (doc 12 SEC-T16).
# The migrate-prod → Vercel deploy-hook sequence (doc 13 §3.3) lands with PS-003
# once the Neon/Vercel secrets exist.

name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  # prisma validate needs the env vars named in schema.prisma to be present;
  # dummy values are fine — no connection is made.
  DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci?pgbouncer=true'
  DIRECT_URL: 'postgresql://ci:ci@localhost:5432/ci'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 9 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 9 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  prisma-check:
    runs-on: ubuntu-latest
    # Postgres service = the shadow DB the drift check replays migrations into
    # (doc 07 §7.1). Ephemeral, per-run; never touches Neon.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: shadow
          POSTGRES_PASSWORD: shadow
          POSTGRES_DB: shadow
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 9 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma validate
      # Drift check (doc 07 §7.1): replay the committed migrations into the
      # shadow DB and diff against schema.prisma — a non-empty diff means someone
      # edited the schema without generating a migration. Prisma 7 flag is
      # --to-schema (was --to-schema-datamodel in Prisma 6).
      - name: migrations drift check
        env:
          # Prisma 7 reads the shadow DB from config datasource.shadowDatabaseUrl
          # (prisma.config.ts), fed by this env var — points at the service above.
          SHADOW_DATABASE_URL: postgresql://shadow:shadow@localhost:5432/shadow
        run: |
          pnpm prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema ./prisma/schema.prisma \
            --exit-code

  i18n-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 9 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run tests/unit/i18n-parity.test.ts

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 9 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  security-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { fetch-depth: 0 } # gitleaks scans history
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 9 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Real integration suite (doc 13 §3.2) needs NEON_API_KEY + NEON_PROJECT_ID
      # secrets to create branch preview/pr-N. Activates with PS-003; until then
      # this check reports success with an explicit skip notice so branch
      # protection can already require it.
      - name: integration tests (Neon branch)
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          if [ -z "$NEON_API_KEY" ]; then
            echo "::notice::Neon secrets not configured yet (pre-PS-003) — integration suite skipped."
            exit 0
          fi
          echo "TODO(PS-003): create Neon branch, migrate deploy + db seed, run integration suites."
          exit 1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 9 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: bundle secret grep (doc 13 §4.5)
        run: bash scripts/check-bundle-secrets.sh
